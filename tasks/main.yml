---

- name: Import extra vars
  ansible.builtin.include_vars:
    file: hwaccel_config_maps.yml

- name: Ensure valid Docker network is used
  ansible.builtin.assert:
    that: immich_docker_container_network != 'bridge'
    fail_msg: The default Docker network 'bridge' cannot be used for Immich.

- name: Manage Immich Docker volumes
  ansible.builtin.include_tasks: manage_volume.yml
  loop: "{{ immich_docker_volumes_to_manage }}"
  loop_control:
    label: "{{ volume.description }}: {{ volume.config.name }}"
    loop_var: volume
  when: volume.when

- name: Volume changes conditional block
  when:
    - immich_docker_containers_awaiting_migration is defined
    - immich_docker_containers_awaiting_migration | length > 0
  block:
    - name: Display volume change migration notice
      ansible.builtin.debug:
        msg:
          - ""
          - "========================================================================"
          - "MANUAL DATA MIGRATION REQUIRED"
          - "========================================================================"
          - ""
          - "The following volume(s) have changed configuration:"
          - "{% for c in immich_docker_containers_awaiting_migration %}  - {{ c.volume_description }} (affects {{ c.description }})\n{% endfor %}"
          - "All Immich containers will remain stopped to ensure a clean migration."
          - ""
          - "NEXT STEPS:"
          - "  1. Manually migrate data from the old volume(s) to the new volume(s)"
          - "  2. Run this role again to start all container(s)"
          - ""
          - "========================================================================"

    - name: Stop all Immich containers when volume changes detected
      community.docker.docker_container:
        name: "{{ item.name }}"
        state: absent
        comparisons:
          '*': ignore
      loop: "{{ immich_docker_containers }}"

- name: Create Immich Docker network
  community.docker.docker_network:
    name: "{{ immich_docker_container_network }}"
    state: present

- name: Ensure required directories exist on the host
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
    state: directory
  become: true
  loop: "{{ immich_docker_dirs }}"
  loop_control:
    label: "{{ item.description }}: {{ item.path }}"
  when: item.when

- name: Deploy Immich containers # noqa args[module]
  community.docker.docker_container: "{{ item }}"
  loop: "{{ immich_docker_containers }}"
  register: containers_result
  loop_control:
    label: "{{ item.name }}"
    break_when: containers_result is failed
  when: immich_docker_containers_awaiting_migration is not defined
