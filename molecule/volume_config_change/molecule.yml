---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml

driver:
  name: docker

platforms:
  - name: instance
    image: "ghcr.io/tigattack/docker-debian13-ansible-dind:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - /var/lib/docker
    cgroupns_mode: host
    privileged: true
    pre_build_image: true

ansible:
  playbooks:
    prepare: prepare.yml
    converge: converge.yml
  cfg:
    defaults:
      callbacks_enabled: profile_tasks
      inject_facts_as_vars: false

provisioner:
  name: ansible
  inventory:
    group_vars:
      all:
        immich_docker_db_password: immich_test_password
        immich_docker_data_use_docker_volume: true
        immich_docker_model_cache_use_docker_volume: true

scenario:
  test_sequence:
    - dependency
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
