---
- name: Verify
  hosts: all
  tasks:
    - name: Get Immich server container info
      community.docker.docker_container_info:
        name: immich-server
      register: server_container_info

    - name: Get Redis container info
      community.docker.docker_container_info:
        name: immich-redis
      register: redis_container_info

    - name: Get PostgreSQL container info
      community.docker.docker_container_info:
        name: immich-postgres
      register: postgres_container_info

    - name: Get machine learning container info
      community.docker.docker_container_info:
        name: immich-machine-learning
      register: ml_container_info

    - name: Get Immich data volume info
      community.docker.docker_volume_info:
        name: immich_data
      register: data_volume_info

    - name: Assert Immich data volume exists
      ansible.builtin.assert:
        that: data_volume_info.exists
        fail_msg: Immich data volume should exist after volume change

    - name: Assert all containers are stopped after volume change
      ansible.builtin.assert:
        that:
          - not server_container_info.exists
          - not redis_container_info.exists
          - not postgres_container_info.exists
          - not ml_container_info.exists
        fail_msg: All Immich containers should be stopped when any volume changes (to prevent dependency issues)
