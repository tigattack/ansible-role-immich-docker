---

- name: Verify
  hosts: all
  tasks:
    - name: Get Immich server container info
      community.docker.docker_container_info:
        name: immich_server
      register: container_info

    - name: Get Immich storage volume info
      community.docker.docker_volume_info:
        name: immich_storage
      register: storage_volume_info

    - name: Assert Immich storage volume exists
      ansible.builtin.assert:
        that: storage_volume_info.exists

    - name: Assert Immich is using the correct storage volume
      ansible.builtin.assert:
        that: >-
          container_info.container.Mounts
          | selectattr('Type', 'equalto', 'volume')
          | selectattr('Name', 'equalto', 'immich_storage')
          | length > 0

    - name: Assert Immich is healthy
      ansible.builtin.assert:
        that: container_info.container.State.Health.Status == 'healthy'

    - name: Create test file to verify volume is writable
      ansible.builtin.command:
        cmd: docker exec immich_server sh -c 'echo "Test writability" > /data/test_write.txt'
      changed_when: true

    - name: Read test file to verify writability
      ansible.builtin.command:
        cmd: docker exec immich_server cat /data/test_write.txt
      register: test_file_content
      changed_when: false

    - name: Assert volume is writable
      ansible.builtin.assert:
        that:
          - "'Test writability' in test_file_content.stdout"
        fail_msg: Docker volume is not writable
