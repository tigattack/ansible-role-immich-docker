---
argument_specs:
  main:
    short_description: Deploy Immich in Docker
    description:
      - This role will deploy Immich server and all required services in Docker containers.
    version_added: '1.0.0'
    author: tigattack
    options:
      immich_docker_container_base_name:
        type: str
        default: immich
        description: Base name for Immich containers.

      immich_docker_containers_state:
        type: str
        default: healthy
        description:
          - The desired state of the Immich containers.
          - For valid options, see the C(state) parameter of M(community.docker.docker_container).

      immich_docker_container_network:
        type: str
        default: immich
        description:
          - Name of the Docker network to connect the Immich containers to.
          - Note that V(bridge), the default Docker container network, must NOT be used.

      immich_docker_version:
        type: str
        default: release
        description:
          - Immich Docker image version (tag).
          - Can be V(release) or any other valid image tag (e.g. V(v2.1.0), etc).
          - See more at U(https://github.com/immich-app/immich/pkgs/container/immich-server).

      immich_docker_env_vars:
        type: dict
        default: {}
        description: Environment variables to pass to the Immich server container.

      immich_docker_bind_paths_root:
        type: path
        default: /opt/immich
        description: Root path for Immich bind mounts on the host.

      immich_docker_data_bind_path:
        type: path
        default: <immich_docker_bind_paths_root>/data
        description:
          - Immich data path on the host.
          - Mutually exclusive with C(immich_docker_data_*_volume) variables.
          - Only used if O(immich_docker_data_use_docker_volume=false) (default).

      immich_docker_storage_bind_path:
        type: path
        default: <immich_docker_bind_paths_root>/storage
        description:
          - Immich storage path on the host for uploaded media.
          - Mutually exclusive with C(immich_docker_storage_*_volume) variables.
          - Only used if O(immich_docker_storage_use_docker_volume=false) (default).

      immich_docker_model_cache_bind_path:
        type: path
        default: <immich_docker_bind_paths_root>/model_cache
        description:
          - Immich machine learning model cache path on the host.
          - Mutually exclusive with C(immich_docker_model_cache_*_volume) variables.
          - Only used if O(immich_docker_model_cache_use_docker_volume=false) (default).

      immich_docker_db_data_bind_path:
        type: path
        default: <immich_docker_bind_paths_root>/db
        description:
          - PostgreSQL data path on the host.
          - Mutually exclusive with C(immich_docker_db_data_*_volume) variables.
          - Only used if O(immich_docker_db_data_use_docker_volume=false) (default).

      immich_docker_data_use_docker_volume:
        type: bool
        default: false
        description:
          - Use a Docker volume for Immich data, as opposed to a bind mount.
          - This and the O(immich_docker_data_volume) variable are mutually exclusive with the O(immich_docker_data_bind_path) variable.
          - If O(immich_docker_data_use_docker_volume=true), O(immich_docker_data_bind_path) will be ignored.

      immich_docker_data_volume:
        type: dict
        required: false
        default:
          name: immich_data
          driver: local
          driver_options: {}
        description:
          - Dictionary of settings for the Immich data Docker volume.
          - A Docker volume defined in this variable will only be used if O(immich_docker_data_use_docker_volume=true).
          - For more information, see U(https://docs.ansible.com/ansible/latest/collections/community/docker/docker_volume_module.html).
        options:
          name:
            type: str
            required: false
            description: Docker volume name.
            default: immich_data
          driver:
            type: str
            required: false
            description: Docker volume driver.
            default: local
          driver_options:
            type: dict
            required: false
            description: Docker volume driver options.
            default: {}

      immich_docker_storage_use_docker_volume:
        type: bool
        default: false
        description:
          - Use a Docker volume for Immich storage, as opposed to a bind mount.
          - This and the O(immich_docker_storage_volume) variable are mutually exclusive with the O(immich_docker_storage_bind_path) variable.
          - If O(immich_docker_storage_use_docker_volume=true), O(immich_docker_storage_bind_path) will be ignored.

      immich_docker_storage_volume:
        type: dict
        required: false
        default:
          name: immich_storage
          driver: local
          driver_options: {}
        description:
          - Dictionary of settings for the Immich storage Docker volume.
          - A Docker volume defined in this variable will only be used if O(immich_docker_storage_use_docker_volume=true).
          - For more information, see U(https://docs.ansible.com/ansible/latest/collections/community/docker/docker_volume_module.html).
        options:
          name:
            type: str
            required: false
            description: Docker volume name.
            default: immich_storage
          driver:
            type: str
            required: false
            description: Docker volume driver.
            default: local
          driver_options:
            type: dict
            required: false
            description: Docker volume driver options.
            default: {}

      immich_docker_model_cache_use_docker_volume:
        type: bool
        default: false
        description:
          - Use a Docker volume for Immich machine learning model cache, as opposed to a bind mount.
          - This and the O(immich_docker_model_cache_volume) variable are mutually exclusive with the O(immich_docker_model_cache_bind_path) variable.
          - If O(immich_docker_model_cache_use_docker_volume=true), O(immich_docker_model_cache_bind_path) will be ignored.

      immich_docker_model_cache_volume:
        type: dict
        required: false
        default:
          name: immich_model_cache
          driver: local
          driver_options: {}
        description:
          - Dictionary of settings for the Immich model cache Docker volume.
          - For more information, see U(https://docs.ansible.com/ansible/latest/collections/community/docker/docker_volume_module.html).
        options:
          name:
            type: str
            required: false
            description: Docker volume name.
            default: immich_model_cache
          driver:
            type: str
            required: false
            description: Docker volume driver.
            default: local
          driver_options:
            type: dict
            required: false
            description: Docker volume driver options.
            default: {}

      immich_docker_db_data_use_docker_volume:
        type: bool
        default: false
        description:
          - Use a Docker volume for PostgreSQL data, as opposed to a bind mount.
          - This and the O(immich_docker_db_data_volume) variable are mutually exclusive with the O(immich_docker_db_data_bind_path) variable.
          - If O(immich_docker_db_data_use_docker_volume=true), O(immich_docker_db_data_bind_path) will be ignored.

      immich_docker_db_data_volume:
        type: dict
        required: false
        default:
          name: immich_db_data
          driver: local
          driver_options: {}
        description:
          - Dictionary of settings for the PostgreSQL data Docker volume.
          - A Docker volume defined in this variable will only be used if O(immich_docker_db_data_use_docker_volume=true).
          - For more information, see U(https://docs.ansible.com/ansible/latest/collections/community/docker/docker_volume_module.html).
        options:
          name:
            type: str
            required: false
            description: Docker volume name.
            default: immich_db_data
          driver:
            type: str
            required: false
            description: Docker volume driver.
            default: local
          driver_options:
            type: dict
            required: false
            description: Docker volume driver options.
            default: {}

      immich_docker_extra_volumes:
        type: list
        elements: dict
        default: []
        description:
          - A list of extra bind mounts for the Immich server container.
          - For valid options, see the C(mounts) parameter of M(community.docker.docker_container).

      immich_docker_machine_learning_extra_volumes:
        type: list
        elements: dict
        default: []
        description:
          - A list of extra bind mounts for the Immich machine learning container.
          - For valid options, see the C(mounts) parameter of M(community.docker.docker_container).

      immich_docker_machine_learning_version:
        type: str
        default: release
        description:
          - Immich machine learning Docker image version (tag).

      immich_docker_machine_learning_acceleration:
        type: str
        default: cpu
        description:
          - Hardware acceleration backend for machine learning.
          - See U(https://docs.immich.app/features/ml-hardware-acceleration/) for more information.

      immich_docker_machine_learning_env_vars:
        type: dict
        default: {}
        description: Environment variables to pass to the Immich machine learning container.

      immich_docker_deploy_postgres:
        type: bool
        default: true
        description:
          - Deploy a PostgreSQL instance for Immich.
          - Set to V(false) if using an external PostgreSQL instance.

      immich_docker_postgres_version:
        type: str
        default: '14-vectorchord0.4.3-pgvectors0.2.0'
        description: PostgreSQL Docker image version for Immich.

      immich_docker_postgres_image:
        type: str
        default: ghcr.io/immich-app/postgres:<immich_docker_postgres_version>
        description: PostgreSQL Docker image for Immich.

      immich_docker_db_username:
        type: str
        default: postgres
        description: PostgreSQL username for Immich.

      immich_docker_db_database_name:
        type: str
        default: immich
        description: PostgreSQL database name for Immich.

      immich_docker_db_password:
        type: str
        default: postgres
        description: PostgreSQL password for Immich.

      immich_docker_deploy_redis:
        type: bool
        default: true
        description:
          - Deploy a Redis instance for Immich.
          - Set to V(false) if using an external Redis instance.

      immich_docker_redis_version:
        type: raw
        default: 9
        description: Redis/Valkey Docker image version for Immich.

      immich_docker_redis_image:
        type: str
        default: docker.io/valkey/valkey:<immich_docker_redis_version>
        description: Redis/Valkey Docker image for Immich.
